<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>💍 Galería de la boda</title>

<style>
.selector {
  position: absolute;
  top: 8px;
  left: 8px;
  width: 22px;
  height: 22px;
  cursor: pointer;
  z-index: 2;
}

body{
  margin:0;
  background:#fafafa;
  font-family:sans-serif;
}

h1{
  text-align:center;
  padding:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img,
.card video{
  width:100%;
  display:block;
}

.actions{
  padding:10px;
  text-align:center;
}

.download{
  background:black;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lightbox img,
.lightbox video{
  max-width:95%;
  max-height:95%;
}

.close{
  position:absolute;
  top:15px;
  right:15px;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:white;
  font-size:24px;
  cursor:pointer;
}

</style>
</head>

<body>

<h1>📸 Nuestra boda</h1>

<div style="padding:10px; text-align:center;">
  <p id="selectedCount">0 seleccionados</p>

  <button onclick="downloadSelected()">
    ⬇ Descargar seleccionados
  </button>
  <button onclick="clearSelection()">
    ❌ Deseleccionar todo
  </button>
</div>

<div id="gallery" class="grid"></div>

<div id="lightbox" class="lightbox">

<button class="close" onclick="closeLightbox()">
×
</button>

<div id="viewer"></div>

</div>

<script>

const API =
"https://uceerskxdlwoyzwenzrm.supabase.co/functions/v1/gallery-files";

const selected = new Set();

async function loadGallery(){

  const res = await fetch(API, {
    headers: {
      "x-boda-auth": sessionStorage.getItem("boda_auth") || "none"
    }
  });
  
  if (!res.ok) {
    const err = await res.text();
    console.error("GALERÍA ERROR:", err);
    return;
  }
  
  const files = await res.json();

  const gallery =
    document.getElementById("gallery");

  gallery.innerHTML = "";

  files.forEach(file=>{

    const card =
      document.createElement("div");

    card.className = "card";

    let media = "";

    if(file.isVideo){

      media = `
      <video
        controls
        preload="metadata"
        onclick="openVideo('${file.url}')"
      >
        <source src="${file.url}">
      </video>
      `;

    }else{

      media = `
      <img
        src="${file.url}"
        onclick="openImage('${file.url}')"
      >
      `;

    }

    card.innerHTML = `
      <div style="position:relative">
    
        <input type="checkbox"
          class="selector"
          onchange="toggleSelect('${file.url}', this.checked)"
        >
    
        ${media}
    
        <div class="actions">
          <button
            class="download"
            onclick="downloadFile('${file.url}','${file.name}')"
          >
            ⬇ Descargar
          </button>
        </div>
    
      </div>
    `;

    gallery.appendChild(card);

  });

}

function openImage(url){

  document.getElementById("viewer").innerHTML = `
    <img src="${url}">
  `;

  document.getElementById("lightbox")
    .style.display = "flex";
}

function openVideo(url){

  document.getElementById("viewer").innerHTML = `
    <video
      controls
      autoplay
      style="max-width:95vw;max-height:95vh"
    >
      <source src="${url}">
    </video>
  `;

  document.getElementById("lightbox")
    .style.display = "flex";
}

function closeLightbox(){

  document.getElementById("lightbox")
    .style.display = "none";

  document.getElementById("viewer")
    .innerHTML = "";
}

function clearSelection() {
  selected.clear();

  document.querySelectorAll(".selector").forEach(cb => {
    cb.checked = false;
  });

  document.getElementById("selectedCount").innerText = "0 seleccionados";
}

async function downloadFile(url, filename) {
  try {
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("Error descargando archivo");
    }

    const blob = await response.blob();

    const objectUrl = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = objectUrl;
    a.download = filename;

    document.body.appendChild(a);
    a.click();
    a.remove();

    window.URL.revokeObjectURL(objectUrl);

  } catch (e) {
    alert("No se pudo descargar el archivo");
    console.error(e);
  }
}

function toggleSelect(url, checked) {

  if (checked) {
    selected.add(url);
  } else {
    selected.delete(url);
  }

  document.getElementById("selectedCount").innerText =
    `${selected.size} seleccionados`;
}

async function downloadSelected() {

  if (selected.size === 0) {
    alert("Selecciona archivos");
    return;
  }

  if (selected.size > 6) {
    alert("Máximo 6 archivos");
    return;
  }

  const items = Array.from(selected).map(url => ({
    url,
    name: url.split("/").pop()
  }));

  for (const file of items) {
    await downloadFile(file.url, file.name);
    await new Promise(r => setTimeout(r, 400));
  }
}

loadGallery();

</script>

</body>
</html>
