<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boda 💍 - Fotos</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #fafafa;
    }

    .preview {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .item {
      position: relative;
      width: 100px;
    }

    .item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
    }

    .remove {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📸 Sube tus fotos de la boda</h1>

<input type="file" id="file" accept="image/*" multiple />
<br>
<button onclick="upload()">Subir fotos</button>

<p id="status"></p>

<div class="preview" id="preview"></div>

<script>
const URL = "https://uceerskxdlwoyzwenzrm.supabase.co/functions/v1/upload-photo";
const TOKEN = "3pVW7QPJYJ9ljpf6RGdHqcgDzuWUyKxLVmok3QIfeFQRZZPZtvYFSI7vu9mWDi6u";

let selectedFiles = [];

document.getElementById("file").addEventListener("change", (e) => {
  selectedFiles = Array.from(e.target.files);
  renderPreview();
});

function renderPreview() {
  const container = document.getElementById("preview");
  container.innerHTML = "";

  selectedFiles.forEach((file, index) => {
    const reader = new FileReader();

    reader.onload = (e) => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <img src="${e.target.result}" />
        <button class="remove" onclick="removeFile(${index})">×</button>
      `;

      container.appendChild(div);
    };

    reader.readAsDataURL(file);
  });
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderPreview();
}

async function upload() {
  const status = document.getElementById("status");

  if (!selectedFiles.length) {
    status.innerText = "Selecciona fotos primero 📷";
    return;
  }

  status.innerText = "Subiendo... ⏳";

  for (let file of selectedFiles) {
    const form = new FormData();
    form.append("file", file);

    const res = await fetch(URL, {
      method: "POST",
      headers: {
        "x-upload-token": TOKEN
      },
      body: form
    });

    await res.text();
  }

  status.innerText = "¡Fotos subidas! 🎉 Gracias ❤️";
  selectedFiles = [];
  document.getElementById("preview").innerHTML = "";
}
</script>

</body>
</html>
