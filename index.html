<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boda 💍</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      max-width: 320px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .emoji {
      font-size: 40px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>💍 Nuestra boda</h1>
  <p>Comparte o mira las fotos del gran día</p>

  <!-- SUBIR FOTOS -->
  <a href="upload.html">
    <div class="card">
      <div class="emoji">📤</div>
      <h2>Subir fotos</h2>
      <p>Haz fotos y compártelas con nosotros</p>
    </div>
  </a>

  <!-- GALERÍA -->
  <a href="gallery.html">
    <div class="card">
      <div class="emoji">🖼</div>
      <h2>Ver galería</h2>
      <p>Mira todas las fotos de los invitados</p>
    </div>
  </a>

</div>

</body>
</html>
