<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boda 💍 - Fotos y Vídeos</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #fafafa;
    }

    .dropzone {
      border: 2px dashed #aaa;
      padding: 20px;
      border-radius: 12px;
      background: white;
    }

    .preview {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .item {
      position: relative;
      width: 100px;
    }

    .item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
    }

    .remove {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
    
      display: flex;
      align-items: center;
      justify-content: center;
    
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.2s;
    }
  </style>
</head>

<body>

<h1>📸 Sube tus archivos de la boda</h1>

<div class="dropzone" id="dropzone">
  <p>Arrastra fotos/vídeos aquí o selecciónalos 👇</p>
  <input
    type="file"
    id="file"
    accept="image/*,video/*"
    multiple
  />
</div>

<div class="preview" id="preview"></div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<button onclick="upload()">Subir archivos</button>

<p id="status"></p>

<script>
const URL = "https://uceerskxdlwoyzwenzrm.supabase.co/functions/v1/upload-photo";
const TOKEN = "Hl2GHLcUPXQxI0yez1KDbdg3ULkgcFOlLdXLuhxeaEaBk3W6jxgamcwz7UF8ct3F";

let selectedFiles = [];

const input = document.getElementById("file");
const preview = document.getElementById("preview");
const status = document.getElementById("status");
const bar = document.getElementById("bar");
const dropzone = document.getElementById("dropzone");

input.addEventListener("change", (e) => {
  addFiles(e.target.files);
});

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
});

dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  addFiles(e.dataTransfer.files);
});

function addFiles(files) {

  const incoming = Array.from(files);

  if (
    selectedFiles.length +
    incoming.length > 10
  ) {
    status.innerText =
      "⚠️ Máximo 10 archivos por subida";
    return;
  }

  selectedFiles =
    selectedFiles.concat(incoming);

  render();
}

function render() {
  preview.innerHTML = "";

  selectedFiles.forEach((file, index) => {
    const reader = new FileReader();

    reader.onload = (e) => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <img src="${e.target.result}" />
        <button class="remove" onclick="removeFile(${index})">×</button>
      `;

      preview.appendChild(div);
    };

    reader.readAsDataURL(file);
  });
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  render();
}

async function upload() {
  if (selectedFiles.length > 10) {
    status.innerText =
      "Máximo 10 archivos por subida 📷";
    return;
  }
  
  if (!selectedFiles.length) {
    status.innerText = "Selecciona archivos primero 📷";
    return;
  }

  status.innerText = "Subiendo... ⏳";
  bar.style.width = "0%";

  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];

    const form = new FormData();
    form.append("file", file);

    await fetch(URL, {
      method: "POST",
      headers: {
        "x-upload-token": TOKEN,
        "x-boda-auth": sessionStorage.getItem("boda_auth")
      },
      body: form
    });

    const progress = ((i + 1) / selectedFiles.length) * 100;
    bar.style.width = progress + "%";
  }

  status.innerText = "¡Archivos subidos! 🎉 Gracias ❤️";
  selectedFiles = [];
  preview.innerHTML = "";
}
</script>

</body>
</html>
