<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boda 💍 - Galería</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fafafa;
    }

    h1 {
      text-align: center;
      padding: 15px;
    }

    .grid {
      column-count: 3;
      column-gap: 8px;
      padding: 8px;
    }

    @media (max-width: 800px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 1; }
    }

    .item {
      break-inside: avoid;
      margin-bottom: 8px;
    }

    .item img {
      width: 100%;
      border-radius: 10px;
      display: block;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>📸 Nuestra boda</h1>

<div class="grid" id="grid"></div>
<div class="loading" id="loading">Cargando fotos... ⏳</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" />
</div>

<script>
const SUPABASE_URL = "https://uceerskxdlwoyzwenzrm.supabase.co";
const BUCKET = "fotos-boda";

let offset = 0;
const limit = 30;
let loading = false;

async function loadImages() {
  if (loading) return;
  loading = true;

  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ limit, offset })
  });

  const data = await res.json();

  const grid = document.getElementById("grid");

  data.forEach(file => {
    const url = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${file.name}`;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `<img src="${url}" onclick="openLightbox('${url}')">`;

    grid.appendChild(div);
  });

  offset += limit;
  loading = false;

  if (data.length < limit) {
    document.getElementById("loading").innerText = "Fin de la galería ❤️";
  }
}

// infinite scroll simple
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadImages();
  }
});

function openLightbox(url) {
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

loadImages();
</script>

</body>
</html>
